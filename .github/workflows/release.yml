name: Release NBM

# The NBM is built LOCALLY (requires an Autopsy installation, which GitHub
# runners don't have) and committed to dist/ before tagging. This workflow only
# attaches that prebuilt artifact to a GitHub Release — no build, no failures.
#
# Release procedure:
#   ant clean nbm
#   cp build/org-sleuthkit-autopsy-enhancedgallery.nbm dist/
#   git add dist && git commit && git push
#   git tag vX.Y.Z && git push origin vX.Y.Z

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Find prebuilt NBM
        id: find_nbm
        run: |
          nbm=$(ls dist/*.nbm | head -n 1)
          if [ -z "$nbm" ]; then
            echo "No prebuilt .nbm in dist/ — build locally and commit it before tagging." >&2
            exit 1
          fi
          echo "NBM_PATH=$nbm" >> "$GITHUB_OUTPUT"
          echo "NBM_NAME=$(basename "$nbm")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Enhanced Evidence Gallery ${{ github.ref_name }}"
          body: |
            ## Enhanced Evidence Gallery ${{ github.ref_name }}

            Extended evidence gallery for Autopsy: images, video, audio and documents
            (PDF, Office, e-mail…) with thumbnail grid, grouping and filtering,
            bulk review workflow (seen/tagged, MD5 propagation), EXIF/GPS panel,
            "Show on map" with photo pins, file-name/group search with history and
            multi-phrase (`a|b`) matching, and export of selected files to disk.

            ### Installation
            1. Download `${{ steps.find_nbm.outputs.NBM_NAME }}` below
            2. In Autopsy: **Tools → Plugins → Downloaded → Add Plugins…**
            3. Select the `.nbm` file → **Install** → **Restart Autopsy**

            ### Requirements
            - Autopsy 4.23.1+
            - Optional: ImageMagick, FFmpeg, dcraw (configure in ⚙ Settings)
            - AI features (semantic search, Find similar) require the companion
              plugins **AI Image Triage** (images) and **AI Text Triage**
              (documents + OCR)

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation.
          files: ${{ steps.find_nbm.outputs.NBM_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
